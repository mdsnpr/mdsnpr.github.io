short_bio_text_justify: false
short_bio: >-
  <p>
    Hi, I am Jacob Kang, an incoming Ph.D. student under <a href="https://www.inspirelab.site/members/nan-xu.html" target="_blank">Prof. Nan Xu</a> in <a href="https://www.inspirelab.site" target="_blank">INSPIRE Lab</a>. 
  </p>
  
  <p>
    During my undergraduate studies at Maryland, I was academically advised by <a href="https://scholar.google.com/citations?user=hBKWbpsAAAAJ&hl=en" target="_blank">Prof. James Yorke</a> on research direction, academic development, and career planning.
    I worked with <a href="https://www.inspirelab.site/members/nan-xu.html" target="_blank">Prof. Nan Xu</a> on Hidden Markov Model-Based Brain State Dynamics using Simultaneous EEG-fMRI in Humans and Simultaneous Ca<sup>2+</sup>-fMRI in Mice.
    I was also supervised by <a href="https://weitzgroup.umd.edu/people/joshua-weitz/" target="_blank">Prof. Joshua Weitz</a> on Infectious Disease Dynamics, with a focus on Breakthrough Infections and Vaccine Hesitancy.
    In addition, I collaborated with Dr. Jonghyeon Seo on EEG-Based Dementia Classification using Dynamic Mode Decomposition, where we developed Clustered Pattern Projection to improve classification reliability.
  </p>
  
  <p>
    My research interests lie at the intersection of computational neuroscience, machine learning, and neuroimaging.
    I am interested in developing computational methods to uncover latent neural representations and characterize nonstationary brain dynamics from multimodal neuroimaging data.
    More broadly, I aim to understand how distributed neural systems generate, regulate, and transition between cognitive and affective states across species and measurement modalities.
  </p>

