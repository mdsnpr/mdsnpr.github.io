short_bio: >-
  <p>
    Hi, I am Jacob Kang, an incoming Ph.D. student under <a href="https://www.inspirelab.site/members/nan-xu.html" target="_blank">Prof. Nan Xu</a> in <a href="https://www.inspirelab.site" target="_blank">INSPIRE Lab</a>. 
    I received my B.S. degree in Computer Science and Mathematics: Statistics from the University of Maryland, College Park, and am continuing my studies in the Bioengineering Ph.D. program at the University of Maryland. 
  </p>
  <p>
    My research interests lie at the intersection of computational neuroscience, machine learning, and neuroimaging. 
    I am interested in developing computational methods to uncover latent neural representations and nonstationary brain dynamics from multimodal neuroimaging data. 
    In the future, I hope to better understand how distributed neural systems generate, regulate, and transition between cognitive and affective states across species and modalities.
  </p>

